<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" fill="#a58242"/>
  <!-- Back cover shadow -->
  <rect x="3" y="5" width="7" height="20" rx="1" fill="rgba(0,0,0,0.15)"/>
  <!-- Spine -->
  <rect x="10" y="5" width="4" height="20" rx="1" fill="#000000"/>
  <!-- Front cover -->
  <rect x="14" y="5" width="15" height="20" rx="1" fill="#000000" opacity="0.85"/>
  <!-- Cover highlight -->
  <rect x="16" y="8" width="11" height="4" rx="0.5" fill="rgba(255,255,255,0.25)"/>
</svg>